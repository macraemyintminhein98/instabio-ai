<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><script src="https://cdn.tailwindcss.com"></script><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');body{font-family:'Inter',sans-serif;}</style></head><body class="bg-gray-100 flex items-center justify-center min-h-screen p-4"><div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md"><h1 class="text-3xl font-bold mb-6 text-center text-gray-800">InstaBio AI</h1><p class="text-gray-600 mb-6 text-center">Craft your perfect Instagram bio instantly!</p><p class="text-sm text-gray-500 mb-4 text-center">Input keywords like "travel blogger" or "foodie" to generate creative bios. Try a few for free!</p><div class="mb-4"><label for="keywords" class="block text-gray-700 text-sm font-semibold mb-2">Keywords:</label><input type="text" id="keywords" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="e.g., travel, photography, adventure"></div><button id="generate" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full">Generate Bios</button><div id="results" class="mt-6 space-y-4"><p class="text-gray-500 text-center">Bios will appear here...</p></div><div id="payment-prompt" class="hidden mt-6 pt-4 border-t border-gray-200 text-center"><p class="text-gray-600 mb-4">Unlock more bio generations for just $4.99!</p><button id="checkout" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Purchase Full Access</button></div></div><script>let generatedCount = 0;document.getElementById('generate').addEventListener('click', async () => {const keywords = document.getElementById('keywords').value;const resultsDiv = document.getElementById('results');resultsDiv.innerHTML = '<p class="text-gray-500 text-center">Generating...</p>';if (keywords.trim() === '') {resultsDiv.innerHTML = '<p class="text-red-500 text-center">Please enter keywords.</p>'; return;}if (generatedCount >= 3) { document.getElementById('payment-prompt').classList.remove('hidden'); resultsDiv.innerHTML = '<p class="text-gray-500 text-center">Please purchase full access for more generations.</p>'; return; }try {const response = await fetch('/api/generate-bio', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ keywords })});const data = await response.json();if (data.bios) {resultsDiv.innerHTML = '';data.bios.forEach(bio => {const bioDiv = document.createElement('div'); bioDiv.className = 'bg-gray-50 p-4 rounded-md flex justify-between items-center'; bioDiv.innerHTML = `<p class="text-gray-800 text-sm">${bio}</p><button class="copy-btn ml-4 text-blue-500 hover:text-blue-700 text-sm">Copy</button>`;resultsDiv.appendChild(bioDiv);});generatedCount++;} else {resultsDiv.innerHTML = `<p class="text-red-500 text-center">Error: ${data.error || 'Failed to generate bios.'}</p>`;}} catch (error) {resultsDiv.innerHTML = '<p class="text-red-500 text-center">Network error. Please try again.</p>';}});document.getElementById('results').addEventListener('click', (e) => {if (e.target.classList.contains('copy-btn')) {const bioText = e.target.previousElementSibling.innerText; navigator.clipboard.writeText(bioText).then(() => {e.target.innerText = 'Copied!'; setTimeout(() => e.target.innerText = 'Copy', 2000);}).catch(err => console.error('Failed to copy text: ', err));}});document.getElementById('checkout').addEventListener('click', () => {alert('Stripe checkout integration would go here!');});</script></body></html>
