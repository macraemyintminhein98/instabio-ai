<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaBio AI - Generate Your Perfect Instagram Bio</title>
    <meta name="description" content="Generate creative and catchy Instagram bios instantly with AI. Just enter keywords!">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: #f7f9fc; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .container { background-color: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); max-width: 600px; width: 100%; text-align: center; }
        h1 { color: #8a2be2; margin-bottom: 25px; font-size: 2.2em; }
        p { margin-bottom: 30px; line-height: 1.6; color: #555; }
        .input-group { margin-bottom: 25px; }
        input[type="text"] { width: calc(100% - 24px); padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; margin-bottom: 15px; }
        button { background-color: #8a2be2; color: white; padding: 14px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.05em; font-weight: 600; transition: background-color 0.3s ease; }
        button:hover { background-color: #6a1ba3; }
        .bio-output { background-color: #f0f4f8; border-radius: 8px; padding: 20px; text-align: left; min-height: 100px; white-space: pre-wrap; font-size: 1.1em; color: #444; border: 1px dashed #c0c0c0; display: none; margin-top: 25px; }
        .loading { display: none; color: #8a2be2; margin-top: 15px; }
        footer { margin-top: 40px; font-size: 0.9em; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <h1>InstaBio AI ✨</h1>
        <p>Generate a captivating Instagram bio in seconds! Tell us about yourself and let AI craft the perfect bio.</p>
        <div class="input-group">
            <input type="text" id="keywordsInput" placeholder="e.g., photographer, travel, foodie, entrepreneur">
            <button id="generateBioBtn" onclick="generateBio()">Generate Bio</button>
        </div>
        <div class="loading" id="loadingMessage">Generating awesome bios...</div>
        <div class="bio-output" id="bioOutput"></div>
        <script>
            function generateBio() {
                const keywords = document.getElementById('keywordsInput').value;
                const outputDiv = document.getElementById('bioOutput');
                const loadingMsg = document.getElementById('loadingMessage');
                
                if (!keywords) {
                    outputDiv.style.display = 'block';
                    outputDiv.textContent = 'Please enter some keywords!';
                    return;
                }

                outputDiv.style.display = 'none';
                loadingMsg.style.display = 'block';

                // In a real application, this would be an API call to your backend
                // For demo purposes, we simulate a delay and output placeholder bios.
                setTimeout(() => {
                    loadingMsg.style.display = 'none';
                    outputDiv.style.display = 'block';
                    const bios = [
                        `📸 Capturing moments & chasing sunsets | Adventure seeker | Explorer at heart | Let's connect! ✨`,
                        `Passionate ${keywords.split(',')[0] || 'creator'} | Storyteller through my lens | Spreading positive vibes & wanderlust.`, 
                        `Crafting beautiful visuals & living life vibrantly | Always learning, always growing. Find me where the wild things are.`
                    ];
                    outputDiv.innerHTML = bios.map(bio => `<p>${bio}</p>`).join('<hr style="border-color:#e0e0e0; margin:15px 0;">');
                }, 2000); // Simulate API call delay
            }
        </script>
    </div>
    <footer>
        &copy; 2023 InstaBio AI. All rights reserved.
    </footer>
</body>
</html>
