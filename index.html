<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaBio AI - Generate Your Perfect Bio</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f0f2f5; color: #333; }
        .container { background: white; padding: 2em; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; width: 90%; text-align: center; }
        h1 { color: #333; margin-bottom: 1em; }
        label { display: block; text-align: left; margin-bottom: 0.5em; font-weight: bold; }
        input[type="text"], textarea, select { width: calc(100% - 20px); padding: 10px; margin-bottom: 1.5em; border: 1px solid #ddd; border-radius: 4px; font-size: 1em; }
        button { background-color: #007bff; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; transition: background-color 0.3s ease; width: 100%; }
        button:hover { background-color: #0056b3; }
        #output { margin-top: 1.5em; padding: 1em; background-color: #e9ecef; border-radius: 4px; text-align: left; min-height: 80px; border: 1px solid #ddd; word-wrap: break-word; }
        .price { font-size: 1.2em; margin-bottom: 1em; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>InstaBio AI</h1>
        <p class="price">Generate 5 Bios for $2.99</p>
        <form id="bioForm">
            <label for="niche">Niche/Industry:</label>
            <input type="text" id="niche" placeholder="e.g., fitness coach, artist, small business" required>
            
            <label for="keywords">Keywords (comma-separated):</label>
            <input type="text" id="keywords" placeholder="e.g., #YogaLife, #HealthyEating, #HandmadeJewelry">
            
            <label for="tone">Desired Tone:</label>
            <select id="tone">
                <option value="professional">Professional</option>
                <option value="friendly">Friendly</option>
                <option value="humorous">Humorous</option>
                <option value="inspirational">Inspirational</option>
                <option value="quirky">Quirky</option>
            </select>
            
            <button type="submit">Generate Bios</button>
        </form>

        <div id="output">Your AI-generated Instagram bios will appear here!</div>
    </div>
    <script>
        // Placeholder for actual integration logic
        // In a real app, this would make an API call to your backend
        // for bio generation and Stripe checkout.
        document.getElementById('bioForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const niche = document.getElementById('niche').value;
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            
            document.getElementById('output').innerText = 'Generating amazing bios for you... (This is a demo. In a real app, you would be redirected to Stripe for payment and then receive your bios!)';

            // Simulate API call and redirect for Stripe
            setTimeout(() => {
                 // In a real app, you'd get the bio from your backend after payment
                const exampleBios = [
                    `✨ ${niche} | Helping you achieve your goals with a ${tone} touch. DM for collabs! ${keywords.split(',')[0] || ''}`,
                    `Passion for ${niche} | Spreading ${tone} vibes daily. Join my journey! ${keywords.split(',')[1] || '' || '#BioGenerator'}`
                ];
                document.getElementById('output').innerHTML = exampleBios.join('<br><br>');
            }, 2000);
        });
    </script>
</body>
</html>
