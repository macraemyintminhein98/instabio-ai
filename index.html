<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaBio AI</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"><style>body{font-family: 'Inter', sans-serif;}#app{min-height: 100vh; display: flex; flex-direction: column;}</style></head><body class="bg-gradient-to-br from-purple-600 to-blue-500"><div id="app" class="container mx-auto px-4 py-16 text-center text-white"><h1 class="text-5xl font-extrabold mb-4">InstaBio AI</h1><p class="text-xl mb-8">Craft captivating Instagram bios instantly with AI.</p><div class="bg-white bg-opacity-20 backdrop-filter backdrop-blur-lg p-8 rounded-lg shadow-xl max-w-lg mx-auto"><textarea id="keywords" class="w-full p-4 rounded-md mb-4 bg-gray-800 bg-opacity-50 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-400" rows="3" placeholder="Keywords (e.g., 'travel, photography, foodie')"></textarea><select id="tone" class="w-full p-4 rounded-md mb-4 bg-gray-800 bg-opacity-50 text-white focus:outline-none focus:ring-2 focus:ring-purple-400"><option value="professional">Professional</option><option value="creative">Creative</option><option value="humorous">Humorous</option><option value="inspirational">Inspirational</option></select><input type="text" id="cta" class="w-full p-4 rounded-md mb-4 bg-gray-800 bg-opacity-50 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-400" placeholder="Call-to-action (e.g., 'Link in bio!')"><button id="generateBtn" class="bg-purple-700 hover:bg-purple-800 text-white font-bold py-3 px-8 rounded-full transition duration-300 ease-in-out">Generate Bio</button><div id="output" class="mt-8 p-4 bg-white bg-opacity-20 rounded-md text-left text-gray-100 hidden"></div></div><p class="mt-8 text-sm opacity-80">&copy; 2024 InstaBio AI. All rights reserved.</p></div><script>document.getElementById('generateBtn').addEventListener('click', async () => {const keywords = document.getElementById('keywords').value;const tone = document.getElementById('tone').value;const cta = document.getElementById('cta').value;const outputDiv = document.getElementById('output');outputDiv.innerHTML = '<p>Generating...</p>';outputDiv.classList.remove('hidden');try {const response = await fetch('/api/generate-bio', {method: 'POST',headers: {'Content-Type': 'application/json'},body: JSON.stringify({ keywords, tone, cta })});const data = await response.json();if (response.ok) {outputDiv.innerHTML = `<p>${data.bio}</p>`;} else {outputDiv.innerHTML = `<p class="text-red-300">Error: ${data.error || 'Something went wrong.'}</p>`;}} catch (error) {outputDiv.innerHTML = `<p class="text-red-300">Network error: ${error.message}</p>`;}});</script></body></html>
