<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaBio AI - Generate Your Perfect Instagram Bio</title>
    <meta name="description" content="InstaBio AI helps you create engaging and creative Instagram bios instantly.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8e44ad; --secondary: #f4f4f4; --text: #333; --light-text: #666; }
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; background-color: var(--secondary); color: var(--text); line-height: 1.6; }
        .container { max-width: 900px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        h1, h2 { color: var(--primary); }
        p { margin-bottom: 20px; color: var(--light-text); }
        textarea { width: calc(100% - 40px); padding: 15px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; min-height: 100px; resize: vertical; }
        button { background-color: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: 600; transition: background-color 0.3s ease; }
        button:hover { background-color: #6c3483; }
        #result { margin-top: 30px; padding: 20px; background-color: #f9f9f9; border: 1px dashed #ddd; border-radius: 5px; text-align: left; min-height: 50px; }
        .price { font-size: 2.2em; font-weight: 600; color: var(--primary); margin-top: 30px; margin-bottom: 10px; }
        .price span { font-size: 0.6em; color: var(--light-text); font-weight: 400; }
        footer { text-align: center; padding: 20px; color: var(--light-text); font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>InstaBio AI</h1>
        <p>Craft the perfect Instagram bio with AI. Just tell us about yourself!</p>
        <textarea id="keywords" placeholder="E.g., 'Travel blogger, foodie, adventurer, dog mom'" rows="4"></textarea>
        <button id="generateBtn">Generate Bios</button>
        <div id="result">Your generated bios will appear here.</div>
        <p class="price">$9.99 <span>for 20 generations</span></p>
        <button id="buyBtn">Buy Now</button>
    </div>
    <footer>
        &copy; 2023 InstaBio AI. All rights reserved.
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const generateBtn = document.getElementById('generateBtn');
            const keywordsInput = document.getElementById('keywords');
            const resultDiv = document.getElementById('result');
            const buyBtn = document.getElementById('buyBtn');

            generateBtn.addEventListener('click', async () => {
                const keywords = keywordsInput.value.trim();
                if (!keywords) {
                    resultDiv.innerHTML = '<p style="color:red;">Please enter some keywords or a niche!</p>';
                    return;
                }
                resultDiv.innerHTML = '<p>Generating amazing bios...</p>';
                
                // Placeholder for actual API call
                // In a real app, this would call your backend which then calls OpenAI
                setTimeout(() => {
                    const mockBios = [
                        `Wanderlust & Coffee ☕ | Documenting adventures one bite &#x1F35B; at a time | Dog mom to Max &#x1F436; | Life's too short for boring bios! &#x2728;`,
                        `From cityscapes to mountain peaks &#x1F304; | Exploring the world with a camera & good vibes | Sharing my journey, one story at a time. &#x1F4D6;`,
                        `Fuelled by espresso & dreams &#x1F33F; | Your guide to delicious food & unforgettable trips &#x1F30C; | Let's connect and create! &#x1F4DD;`
                    ];
                    resultDiv.innerHTML = mockBios.map(bio => `<p>${bio}</p>`).join('<hr>');
                }, 1500);
            });

            buyBtn.addEventListener('click', () => {
                // Placeholder for Stripe Checkout integration
                alert('Redirecting to secure payment... (Stripe integration would go here)');
                window.location.href = '#'; // Replace with actual Stripe checkout URL
            });
        });
    </script>
</body>
</html>
