<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Instagram Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(to right, #6EE7B7, #3B82F6); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl p-8 max-w-lg w-full text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">InstaBio AI</h1>
        <p class="text-xl text-gray-600 mb-6">Craft your perfect Instagram bio instantly!</p>
        <form id="bioForm">
            <textarea id="keywords" class="w-full p-3 border border-gray-300 rounded-md mb-4 focus:outline-none focus:ring-2 focus:ring-green-400" rows="3" placeholder="Niches, keywords, desired tone (e.g., travel, foodie, witty, professional)"></textarea>
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-md transition duration-300">Generate My Bio ($9.99)</button>
        </form>
        <div id="generatedBio" class="mt-6 p-4 bg-gray-100 rounded-md border border-gray-200 hidden">
            <h3 class="text-lg font-semibold mb-2">Your AI-Powered Bio:</h3>
            <p class="text-gray-700 whitespace-pre-wrap"></p>
        </div>
        <p class="text-sm text-gray-500 mt-6">Powered by AI. Pay once, generate infinitely.</p>
    </div>
    <script>
        document.getElementById('bioForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const bioDisplay = document.getElementById('generatedBio');
            const bioText = bioDisplay.querySelector('p');
            const button = this.querySelector('button');

            button.textContent = 'Generating...';
            button.disabled = true;

            // For a real product, this would trigger a payment flow and then an API call.
            // Here, we simulate it.
            setTimeout(() => {
                bioText.textContent = `🚀 Adventurous Soul | Exploring the world one bite at a time 🍜 | Let's connect! DM for collaborations. ${keywords.split(',')[0] || ''}`;
                bioDisplay.classList.remove('hidden');
                button.textContent = 'Generate My Bio ($9.99)';
                button.disabled = false;
                // In a real app, successful payment would lead to actual bio generation.
                // For this example, we show a sample bio after a delay.
            }, 2000);
        });
    </script>
</body>
</html>
